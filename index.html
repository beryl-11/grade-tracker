<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Grade Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
  <header class="flex">
    <div class="left-box"><a href="index.html" id="logo">Grade Tracker</a></div>
    <div class="right-box">
      <nav>
        <a href="./">Sign In</a>
      </nav>
    </div>
  </header>

  <section id="intro">
    <div class="left-box">
      <h1 class="page-title">Hello, {name}.</h1>
      <p class="overall-grade" id="overall-gpa-statement">Your current GPA is {3.00}.</p>
    </div>
    <div class="right-box">
      <!-- <img src="https://placehold.co/150" alt="graph of grade composition"> -->
    </div>
  </section>

  <hr>
  </hr>

  <section id="grade-details">
    <h1>Details</h1>

    <div class="flex" id="details-list">
      <div class="semester-group" id="Fall-2026-group">
        <button type="button" class="collapsible-btn">Fall 2026</button>

        <div class="collapsible-content">
          <a class="row-link" href="F26C1.html">
            <span class="course-name">F26C1</span><span class="course-grade">A+</span>
          </a>
          <a class="row-link" href="F26C1.html">
            <span class="course-name">F26C2</span><span class="course-grade">A-</span>
          </a>
        </div>
      </div>


      <div class="semester-group" id="Spring-2026-group">
        <button type="button" class="collapsible-btn">Spring 2026</button>

        <div class="collapsible-content">
          <a class="row-link" href="S26C1.html">
            <span class="course-name">S26C1</span><span class="course-grade">A+</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <div class="toolbar">
    <button type="button" class="btn" id="add-course-btn">+</button>
  </div>
</body>

</html>
