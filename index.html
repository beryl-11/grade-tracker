<!DOCTYPE html>
<html lang="en">

<head>
  <title>Grade Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
  <section id="main">
    <h1 class="page-title">Grade Tracker</h1>

    <h2>Overall GPA: 3.70</h2>

    <div class="semester-group" id="Fall-2026-group">
      <button>Fall 2026</button>

      <div class="collapsible-content">
        <table>
          <tr data-href="F26C1.html">
            <td>F26C1</td>
            <td>A+</td>
          </tr>
          <tr data-href="F26C1.html">
            <td>F26C2</td>
            <td>A-</td>
          </tr>
        </table>
      </div>
    </div>

    <div class="semester-group" id="Spring-2026-group">
      <button>Spring 2026</button>

      <div class="collapsible-content">
        <table>
          <tr data-href="F26C1.html">
            <td>S26C1</td>
            <td>A</td>
          </tr>
          <tr>
            <td>S26C2</td>
            <td>B+</td>
          </tr>
        </table>
      </div>
    </div>

    <div class="semester-group" id="Fall-2025-group">
      <button>Fall 2025</button>

      <div class="collapsible-content">
        <table>
          <tr>
            <td>F25C1</td>
            <td>A+</td>
          </tr>
          <tr>
            <td>F25C2</td>
            <td>A</td>
          </tr>
        </table>
      </div>
    </div>

    <!--TODO: put into .js file-->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const rows = document.querySelectorAll("tr[data-href]");

        rows.forEach(row => {
          row.addEventListener("click", () => {
            window.location.href = row.dataset.href;
          });
        });
      });
    </script>

    <div class="toolbar">
      <button type="button" class="btn" id="add-course-button">Add a Course</button>
    </div>
  </section>

  </section>
</body>

</html>
