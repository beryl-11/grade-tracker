<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Grade Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <h1 class="page-title">My Grade Tracker</h1>

    <h2 id="overall-gpa">Overall GPA: 3.70</h2>

    <div class="semester-group" id="Fall-2026-group">
      <button type="button" class="collapsible-btn">Fall 2026</button>

      <div class="collapsible-content">
        <a class="row-link" href="F26C1.html">
          <span class="course-name">F26C1</span><span class="course-grade">A+</span>
        </a>
        <a class="row-link" href="F26C1.html">
          <span class="course-name">F26C2</span><span class="course-grade">A-</span>
        </a>
      </div>
    </div>

    <div class="semester-group" id="Spring-2026-group">
      <button type="button" class="collapsible-btn">Spring 2026</button>

      <div class="collapsible-content">
        <table>
          <tr data-href="F26C1.html">
            <td>S26C1</td>
            <td>A</td>
          </tr>
          <tr>
            <td>S26C2</td>
            <td>B+</td>
          </tr>
        </table>
      </div>
    </div>

    <div class="semester-group" id="Fall-2025-group">
      <button type="button" class="collapsible-btn">Fall 2025</button>

      <div class="collapsible-content">
        <table>
          <tr>
            <td>F25C1</td>
            <td>A+</td>
          </tr>
          <tr>
            <td>F25C2</td>
            <td>A</td>
          </tr>
        </table>
      </div>
    </div>

    <!--TODO: put into .js file-->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const rows = document.querySelectorAll("tr[data-href]");

        rows.forEach(row => {
          row.addEventListener("click", () => {
            window.location.href = row.dataset.href;
          });
        });
      });
    </script>

    <div class="toolbar">
      <button type="button" class="btn" id="add-course-button">Add a Course</button>
    </div>
</body>

</html>
